name: flixie_app
description: Flixie - A Flutter frontend for the Flixie backend, available on Android and iOS.
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client for API requests
  http: ^1.2.0

  # Navigation
  go_router: ^13.2.0

  # State management
  provider: ^6.1.2

  # Secure storage for tokens
  flutter_secure_storage: ^9.0.0

  # Cached network images
  cached_network_image: ^3.3.1

  # Icons
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.6
  cloud_firestore: ^5.4.4

  # Local notifications (foreground FCM display)
  flutter_local_notifications: ^18.0.1

  # Logging
  logger: ^2.0.0

  # URL launcher
  url_launcher: ^6.2.5

  dropdown_flutter: ^1.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/logo_icon.png"
  adaptive_icon_background: "#172B4D" # Your background color
  adaptive_icon_foreground: "assets/icon/logo_icon_foreground.png"