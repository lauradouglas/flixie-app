name: flixie_app
description: Flixie - A Flutter frontend for the Flixie backend, available on Android and iOS.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client for API requests
  http: ^1.2.0

  # Navigation
  go_router: ^13.2.0

  # State management
  provider: ^6.1.2

  # Secure storage for tokens
  flutter_secure_storage: ^9.0.0

  # Cached network images
  cached_network_image: ^3.3.1

  # Icons
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
