name: flixie_app
description: Flixie - A Flutter frontend for the Flixie backend, available on Android and iOS.
publish_to: "none"

version: 1.0.1+11

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.0
  go_router: ^13.2.0
  provider: ^6.1.2
  flutter_secure_storage: ^9.0.0
  cached_network_image: ^3.3.1
  cupertino_icons: ^1.0.8

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.6
  cloud_firestore: ^5.4.4

  flutter_local_notifications: ^18.0.1
  logger: ^2.0.0
  url_launcher: ^6.2.5
  dropdown_flutter: ^1.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/
    - assets/splash/

flutter_native_splash:
  color: "#120A24"
  image: assets/icon/flixie_icon_1024.png
  android: true
  ios: true
  web: false
  fullscreen: true

  android_12:
    color: "#120A24"
    image: assets/icon/flixie_icon_1024.png
    icon_background_color: "#120A24"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/flixie_icon_1024.png"

  adaptive_icon_background: "#0B0825"

  remove_alpha_ios: true