name: Android Build

on:
  push:
    branches: [ "main", "AndroidBuild" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Write Firebase config
      run: |
        cat > .env << 'EOF'
        API_BASE_URL=${{ secrets.API_BASE_URL }}
        FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
        FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
        FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
        FIREBASE_WEB_API_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}
        FIREBASE_WEB_APP_ID=${{ secrets.FIREBASE_WEB_APP_ID }}
        FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
        FIREBASE_ANDROID_API_KEY=${{ secrets.FIREBASE_ANDROID_API_KEY }}
        FIREBASE_ANDROID_APP_ID=${{ secrets.FIREBASE_ANDROID_APP_ID }}
        FIREBASE_IOS_API_KEY=${{ secrets.FIREBASE_IOS_API_KEY }}
        FIREBASE_IOS_APP_ID=${{ secrets.FIREBASE_IOS_APP_ID }}
        FIREBASE_IOS_CLIENT_ID=${{ secrets.FIREBASE_IOS_CLIENT_ID }}
        FIREBASE_IOS_BUNDLE_ID=${{ secrets.FIREBASE_IOS_BUNDLE_ID }}
        EOF

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: Clean build
      run: flutter clean

    - name: Install dependencies
      run: flutter pub get

    # - name: Static analysis
    #   run: flutter analyze

    # - name: Run tests
    #   run: flutter test

    - name: Build APK (Release)
      run: flutter build apk --release --dart-define-from-file=.env

    - name: Build App Bundle (Release)
      run: flutter build appbundle --release --dart-define-from-file=.env

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-build-artifacts
        path: |
          build/app/outputs/flutter-apk/app-release.apk
          build/app/outputs/bundle/release/app-release.aab